name: "Test input"
run-name: Test input - ${{ github.event.inputs.ref }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Ref
        required: false
        default: github.sha


jobs:
  Checkout:
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Checkout
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.inputs.ref }}
          
